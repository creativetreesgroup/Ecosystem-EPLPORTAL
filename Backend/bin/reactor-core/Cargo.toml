[package]
name = "reactor-core"
version.workspace = true
edition.workspace = true
publish.workspace = true

[[bin]]
name = "reactor-core"
path = "src/main.rs"

[dependencies]
api-gateway = { version = "0.1.0", path = "../../crates/api-gateway" }
axum = "0.8.9"
dashmap = "6.2.1"
executor = { version = "0.1.0", path = "../../crates/executor" }
poller = { version = "0.1.0", path = "../../crates/poller" }
# Pinned to "=1.3.0" â€” same reasoning as `api-gateway`'s Cargo.toml comment
# on its own `redis` entry: plain `cargo add` resolves 1.4.0 (latest), which
# would conflict with `api-gateway`/`executor`/`poller`'s already-pinned
# `redis = "1.3.0"` (verified: `cargo add` without the pin here failed
# outright with "failed to select a version for `redis`" since 1.4.0 and
# 1.3.0 are semver-incompatible majors-in-practice at this crate's 0.x-style
# versioning). `main.rs`'s `build_state()` calls `redis::Client::open(...)`
# directly to build `AppState.redis` (Fase 6b Task 1) â€” needs `redis` as a
# DIRECT dependency here too (Rust 2021 extern prelude only exposes direct
# deps, not `api-gateway`'s transitive one).
redis = { version = "=1.3.0", features = ["tokio-comp", "connection-manager"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
spx-client = { version = "0.1.0", path = "../../crates/spx-client" }
store = { version = "0.1.0", path = "../../crates/store" }
tokio = { version = "1.52.3", features = ["rt-multi-thread", "macros", "signal", "net"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
uuid = { version = "1.23.5", features = ["v4", "serde"] }
ws-hub = { version = "0.1.0", path = "../../crates/ws-hub" }

[dev-dependencies]
http-body-util = "0.1.3"
# Task 9's boot-smoke test needs raw `sqlx::query`/`query_as` to run
# migrations as the `tower` superuser, set `app_role`'s test password (the
# one-time operational step migration 0019's own comment documents), and
# seed real `agency_credentials` rows (incl. one deliberately-malformed one)
# directly against Postgres â€” `store` re-exports `PgPool` but not the `sqlx`
# crate itself (Rust 2021's extern prelude only exposes DIRECT dependencies),
# same disclosed reasoning `api-gateway`'s own `sqlx` dev/direct dependency
# comment already gives. Feature set mirrors `store`'s Cargo.toml exactly so
# Cargo unifies one `sqlx` build across the workspace instead of two.
sqlx = { version = "0.9.0", features = ["postgres", "runtime-tokio", "tls-rustls-ring-native-roots", "macros", "migrate", "uuid", "chrono"] }
tower = { version = "0.5.3", features = ["util"] }
