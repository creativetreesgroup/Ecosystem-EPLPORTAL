[graph]
targets = []

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# RUSTSEC-2023-0071 ("Marvin Attack": RSA timing sidechannel). `rsa` is pulled
# ONLY transitively by `jwt-simple` (the VAPID JWT signer under
# `web-push-native`, Fase 5's Web Push). VAPID signs exclusively with ECDSA
# P-256 (ES256) — the `rsa` decryption/signing code path is NEVER invoked by our
# usage — and there is no fixed `rsa` release for this advisory. This is an
# unreachable-code ignore, NOT a copyleft/license admission (the MPL-2.0 `ece`
# landmine was avoided by choosing `web-push-native` over the older `web-push`).
ignore = ["RUSTSEC-2023-0071"]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    # BSL-1.0 (Boost Software License 1.0): permissive, OSI-approved, FSF
    # Free/Libre, non-copyleft (MIT-class). Pulled in transitively by `redis`
    # 1.3.0's mandatory `xxhash-rust` dependency (not feature-gateable). Safe
    # for a proprietary codebase — unlike the GPL-3.0 case rejected in Fase 3.
    "BSL-1.0",
]
confidence-threshold = 0.8
# All 10 workspace crates (crates/*, bin/*) inherit `publish = false` from
# [workspace.package] and carry no `license` field — they are internal-only
# and never published. `private.ignore` is cargo-deny's documented mechanism
# for skipping license checks on unpublished workspace members; it does not
# affect license enforcement for any third-party dependency.
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
