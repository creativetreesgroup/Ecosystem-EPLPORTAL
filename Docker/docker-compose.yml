name: tower

networks:
  tower-net:
    driver: bridge

volumes:
  tower-postgres-data:
  tower-redis-data:

secrets:
  tower_master_key:
    # 32 raw random bytes, created ONCE by the operator (not auto-generated by
    # code, so the operator knows it exists and can back it up):
    #   mkdir -p Docker/secrets && openssl rand -out Docker/secrets/tower_master_key 32 && chmod 0400 Docker/secrets/tower_master_key
    file: ./secrets/tower_master_key

services:
  tower-caddy:
    image: caddy:2-alpine
    container_name: tower-caddy
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - tower-net
    depends_on:
      - tower-web
      - tower-reactor-core

  tower-reactor-core:
    build:
      context: ..
      dockerfile: Docker/reactor-core.Dockerfile
    container_name: tower-reactor-core
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TOWER_MASTER_KEY_PATH: /run/secrets/tower_master_key
    secrets:
      - tower_master_key
    networks:
      - tower-net
    depends_on:
      - tower-postgres
      - tower-redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8081/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  tower-auth-sidecar:
    build:
      context: ..
      dockerfile: Docker/auth-sidecar.Dockerfile
    container_name: tower-auth-sidecar
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TOWER_MASTER_KEY_PATH: /run/secrets/tower_master_key
    secrets:
      - tower_master_key
    networks:
      - tower-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8082/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

  tower-web:
    build:
      context: ..
      dockerfile: Docker/frontend.Dockerfile
    container_name: tower-web
    restart: unless-stopped
    environment:
      PORT: "3000"
      ORIGIN: "http://localhost:8080"
    networks:
      - tower-net
    depends_on:
      - tower-reactor-core

  tower-postgres:
    image: postgres:16
    container_name: tower-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tower
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tower_dev_only}
      POSTGRES_DB: tower
    # TEMPORARY (dev-time convenience, see store crate's migration-smoke
    # test): publishes Postgres to localhost only, for `cargo test -p store`
    # run from the host outside any container. Scoped to 127.0.0.1 so it is
    # not reachable off-box; Fase 8's VPS overlay already treats Postgres as
    # internal-only, so this does not violate Fase 0's "no published ports
    # except edge" rule's production/edge-exposure intent.
    # Port 5432 is used by a pre-existing native Postgres on the dev host, so
    # this maps to 15432 instead — `store`'s test_database_url() default and
    # every later fase's local dev docs must use 15432, not 5432. Fase 2
    # still needs this (host-run tests), and so will Fase 3-6 as their crates
    # grow their own store-backed tests — remove only alongside Fase 8's real
    # deployment tooling, not before.
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - tower-postgres-data:/var/lib/postgresql/data
    networks:
      - tower-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tower -d tower"]
      interval: 10s
      timeout: 3s
      retries: 5

  tower-redis:
    image: redis:7
    container_name: tower-redis
    restart: unless-stopped
    # TEMPORARY (dev-time convenience, mirrors tower-postgres's 15432 publish
    # from Fase 2): publishes Redis to localhost only, for the executor crate's
    # real-Redis tests (`cargo test -p executor`) run from the host outside any
    # container — this project's testing standard uses a real Redis, not mocks.
    # Scoped to 127.0.0.1 so it is not reachable off-box; Fase 8's VPS overlay
    # treats Redis as internal-only, so this does not violate Fase 0's "no
    # published ports except edge" intent. Port 6379 is often taken by a
    # pre-existing Redis on the dev host, so this maps to 16379 instead —
    # executor's tests and every later fase's local dev docs must use 16379.
    # Fase 4 needs this (host-run tests) and so will Fase 5-6 as their crates
    # grow Redis-backed tests — remove only alongside Fase 8's real deployment
    # tooling, not before.
    ports:
      - "127.0.0.1:16379:6379"
    volumes:
      - tower-redis-data:/data
    networks:
      - tower-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  tower-retention:
    image: alpine:3
    container_name: tower-retention
    restart: "no"
    command: ["sh", "-c", "echo 'tower-retention: no-op placeholder (Fase 8 implements the real pg_cron-driven job)'; sleep 5"]
    networks:
      - tower-net
